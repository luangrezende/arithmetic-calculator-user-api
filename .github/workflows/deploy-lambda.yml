name: Deploy Lambda Function

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout source code
        uses: actions/checkout@v3

      # Configurar .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0

      # Instalar dependências
      - name: Restore dependencies
        run: dotnet restore

      # Compilar a função Lambda
      - name: Build Lambda function
        run: dotnet lambda package --output-package ./lambda-package.zip

      # Deploy para a AWS Lambda
      - name: Deploy to AWS Lambda
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: ArithmeticCalculatorUserApi # Substitua pelo nome da sua Lambda
          region: ${{ secrets.AWS_REGION }}
          zip-file: ./lambda-package.zip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
